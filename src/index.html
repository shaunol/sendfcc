<style>
  :root {
    --bg: #f0fdfa;
    --surface: #ffffff;
    --text: #134e4a;
    --text-muted: #5f8a87;
    --accent: #0d9488;
    --accent-hover: #0f766e;
    --accent-light: #ccfbf1;
    --border: #d1e7e5;
    --green: #16a34a;
    --red: #dc2626;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 16px;
  }
  [data-theme="dark"] {
    --bg: #0f1513;
    --surface: #1a2320;
    --text: #d1e7e5;
    --text-muted: #7a9e9a;
    --accent: #2dd4bf;
    --accent-hover: #5eead4;
    --accent-light: #1a2f2b;
    --border: #2a3f3a;
    --green: #4ade80;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 520px; }

  /* Header */
  .brand { text-align: center; margin-bottom: 2rem; }
  .brand h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
  .brand h1 .cc { color: var(--accent); }
  .brand p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.35rem; }

  /* Language suggestion */
  .lang-suggest {
    display: none;
    font-size: 0.82rem;
    font-family: var(--mono);
    color: var(--text-muted);
    background: var(--accent-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .lang-suggest a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .lang-suggest a:hover {
    text-decoration: underline;
  }

  /* Features */
  .features {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .features h2 {
    font-size: 0.92rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  .features ul {
    list-style: none;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .features li {
    padding: 0.3rem 0;
    padding-left: 1.25rem;
    position: relative;
  }
  .features li::before {
    content: '\2713';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }

  /* Drop zone */
  .dropzone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .dropzone-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.6; }
  .dropzone-text { color: var(--text-muted); font-size: 0.92rem; line-height: 1.5; }
  .dropzone-text strong { color: var(--accent); }
  .dropzone-limit { color: var(--text-muted); font-family: var(--mono); font-size: 0.75rem; margin-top: 0.75rem; }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* Progress */
  .progress-wrap { display: none; margin-top: 1.5rem; }
  .progress-wrap.active { display: block; }
  .progress-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; transition: width 0.3s; }
  .progress-text { font-family: var(--mono); font-size: 0.78rem; color: var(--text-muted); margin-top: 0.4rem; text-align: center; }

  /* Result */
  .result { display: none; margin-top: 1.5rem; }
  .result.active { display: block; }
  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .result-filename {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-url-row {
    display: flex;
    gap: 0.5rem;
    align-items: stretch;
  }
  .result-url {
    flex: 1;
    font-family: var(--mono);
    font-size: 0.88rem;
    padding: 0.6rem 0.75rem;
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    color: var(--accent-hover);
    font-weight: 500;
    outline: none;
    cursor: text;
  }
  .copy-btn {
    padding: 0.6rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .copy-btn:hover { background: var(--accent-hover); }
  .copy-btn.copied { background: var(--green); }
  .result-meta {
    display: flex;
    gap: 1rem;
    margin-top: 0.75rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .upload-another {
    display: block;
    text-align: center;
    margin-top: 1rem;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.82rem;
    text-decoration: none;
    cursor: pointer;
  }
  .upload-another:hover { text-decoration: underline; }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 1rem;
    padding: 0.6rem 1rem;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    color: var(--red);
    font-family: var(--mono);
    font-size: 0.82rem;
    text-align: center;
  }
  .error-msg.active { display: block; }

  /* Footer */
  footer {
    text-align: center;
    padding: 1.5rem 1rem;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Language picker */
  .lang-picker {
    margin-top: 0.5rem;
  }
  .lang-picker select {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.2rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
  }

  /* Feedback */
  .feedback-wrap { margin-top: 0.75rem; }
  .feedback-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    padding: 0;
  }
  .feedback-toggle:hover { text-decoration: underline; }
  .feedback-form {
    display: none;
    margin-top: 0.75rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .feedback-form.open { display: block; }
  .feedback-form textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.6rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 0.85rem;
    resize: vertical;
    background: var(--surface);
    color: var(--text);
  }
  .feedback-form textarea:focus { outline: none; border-color: var(--accent); }
  .feedback-submit {
    margin-top: 0.5rem;
    width: 100%;
    padding: 0.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.82rem;
    cursor: pointer;
  }
  .feedback-submit:disabled { opacity: 0.4; cursor: default; }
  .ts-status { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-align: center; min-height: 1.2em; }
  .ts-status .dot { display: inline-block; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .feedback-msg { margin-top: 0.5rem; font-family: var(--mono); font-size: 0.78rem; text-align: center; }
  .feedback-msg.ok { color: var(--green); }
  .feedback-msg.err { color: var(--red); }

  .expiry-picker {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.75rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .expiry-picker select {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.25rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  #uploadTs { display:flex; justify-content:center; margin-top:0.75rem; }
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

  /* Theme toggle */
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    line-height: 1;
    transition: border-color 0.15s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* Dark mode overrides */
  [data-theme="dark"] .error-msg { background: #2a1515; border-color: #5c2a2a; }
  [data-theme="dark"] .copy-btn.copied { background: var(--green); color: #0f1513; }

  /* Noscript */
  noscript { display: block; text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
</style>
</head>
<body>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})()</script>
<button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
<main>
  <div class="container">
    <div class="brand">
      <h1>sendf<span class="cc">.cc</span></h1>
      <p>{{h1Sub}}</p>
    </div>

    <div class="lang-suggest" id="langSuggest"></div>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon" aria-hidden="true">&#128228;</div>
      <div class="dropzone-text">
        {{dropText}}
      </div>
      <div class="dropzone-limit">{{dropLimit}}</div>
      <input type="file" id="fileInput" aria-label="{{selectFile}}">
    </div>

    <div class="expiry-picker">
      <label for="expirySelect" class="sr-only">{{expiryLabel}}</label>
      <span class="expiry-label">{{expiryLabel}}</span>
      <select id="expirySelect">
        <option value="1">1h</option>
        <option value="6">6h</option>
        <option value="12">12h</option>
        <option value="24" selected>24h</option>
      </select>
    </div>

    <div id="uploadTs"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">{{uploading}}&hellip;</div>
    </div>

    <div class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></div>

    <div class="result" id="result">
      <div class="result-card">
        <div class="result-filename" id="resultFilename"></div>
        <div class="result-url-row">
          <input type="text" class="result-url" id="resultUrl" readonly>
          <button type="button" class="copy-btn" id="copyBtn" aria-label="{{copy}}">{{copy}}</button>
        </div>
        <div class="result-meta">
          <span id="resultSize"></span>
          <span id="resultExpiry"></span>
        </div>
      </div>
      <a class="upload-another" id="uploadAnother">{{uploadAnother}}</a>
    </div>

    <div class="features">
      <h2>{{featuresHeading}}</h2>
      <ul>
        <li>{{feature1}}</li>
        <li>{{feature2}}</li>
        <li>{{feature3}}</li>
        <li>{{feature4}}</li>
      </ul>
    </div>

    <noscript>
      <p>{{noscriptText}}</p>
    </noscript>
  </div>
</main>

<footer>
  {{footerText}}
  <div class="lang-picker">
    <label for="langPicker" class="sr-only">Language</label>
    <select id="langPicker">
      {{languageOptions}}
    </select>
  </div>
  <div class="feedback-wrap">
    <button type="button" class="feedback-toggle" id="fbToggle">{{feedbackToggle}}</button>
    <form class="feedback-form" id="fbForm" aria-label="{{feedbackToggle}}">
      <label for="fbMsg" class="sr-only">Feedback</label>
      <textarea id="fbMsg" placeholder="{{feedbackPlaceholder}}" maxlength="2000"></textarea>
      <div class="cf-turnstile" id="tsCont"></div>
      <div class="ts-status" id="tsStatus"></div>
      <button type="submit" class="feedback-submit" id="fbSubmit" disabled>{{feedbackSubmit}}</button>
    </form>
    <div class="feedback-msg" id="fbStatus" role="status" aria-live="polite"></div>
  </div>
</footer>

<script>
var L = {{jsStrings}};
(function() {
  var dropzone = document.getElementById('dropzone');
  var fileInput = document.getElementById('fileInput');
  var progressWrap = document.getElementById('progressWrap');
  var progressFill = document.getElementById('progressFill');
  var progressText = document.getElementById('progressText');
  var errorMsg = document.getElementById('errorMsg');
  var resultDiv = document.getElementById('result');
  var resultFilename = document.getElementById('resultFilename');
  var resultUrl = document.getElementById('resultUrl');
  var resultSize = document.getElementById('resultSize');
  var resultExpiry = document.getElementById('resultExpiry');
  var copyBtn = document.getElementById('copyBtn');
  var uploadAnother = document.getElementById('uploadAnother');
  var currentToken = null;
  var uploadToken = null;
  var tsLoaded = false;

  // Language picker
  var langPicker = document.getElementById('langPicker');
  if (langPicker) {
    langPicker.addEventListener('change', function() {
      window.location.href = langPicker.value;
    });
  }

  // Language suggestion
  var LANG_NAMES = { en: 'English', th: '\u0e44\u0e17\u0e22', ja: '\u65e5\u672c\u8a9e', de: 'Deutsch', fr: 'Fran\u00e7ais', es: 'Espa\u00f1ol' };
  var LANG_URLS = { en: '/', th: '/th/', ja: '/ja/', de: '/de/', fr: '/fr/', es: '/es/' };
  (function() {
    var suggest = document.documentElement.dataset.suggestLang;
    if (!suggest || !LANG_NAMES[suggest]) return;
    var el = document.getElementById('langSuggest');
    if (!el) return;
    el.innerHTML = (L.switchLang || '') + ' <a href="' + LANG_URLS[suggest] + '">' + LANG_NAMES[suggest] + '</a>';
    el.style.display = 'block';
  })();

  // Load Turnstile early (invisible, interaction-only)
  function loadTurnstile(targetId, callback) {
    if (tsLoaded) return;
    tsLoaded = true;
    window.__tsReady = function() {
      if (typeof turnstile !== 'undefined') {
        turnstile.render('#' + targetId, {
          sitekey: '0x4AAAAAACyDQkFarV18g9f6',
          size: 'flexible',
          appearance: 'interaction-only',
          callback: function(token) { callback(token); },
          'error-callback': function() {},
        });
      }
    };
    var s = document.createElement('script');
    s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=__tsReady&render=explicit';
    s.async = true;
    document.head.appendChild(s);
  }

  // Load upload Turnstile on page load
  loadTurnstile('uploadTs', function(token) { uploadToken = token; });

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
    return (b / 1073741824).toFixed(1) + ' GB';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('active');
    progressWrap.classList.remove('active');
  }

  function resetUI() {
    dropzone.style.display = '';
    progressWrap.classList.remove('active');
    resultDiv.classList.remove('active');
    errorMsg.classList.remove('active');
    progressFill.style.width = '0%';
    fileInput.value = '';
  }

  function uploadFile(file) {
    if (!file) return;
    if (file.size > 500 * 1024 * 1024) { showError(L.fileTooLarge); return; }
    if (file.size === 0) { showError(L.emptyFile); return; }

    dropzone.style.display = 'none';
    errorMsg.classList.remove('active');
    progressWrap.classList.add('active');
    progressFill.style.width = '0%';
    progressText.textContent = L.uploading + ' ' + file.name;

    var formData = new FormData();
    formData.append('file', file);
    formData.append('token', uploadToken || '');
    var ttl = document.getElementById('expirySelect').value;
    if (ttl && ttl !== '24') formData.append('ttl', ttl);

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload');

    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable) {
        var pct = Math.round((e.loaded / e.total) * 100);
        progressFill.style.width = pct + '%';
        progressText.textContent = pct + '% \u2014 ' + formatBytes(e.loaded) + ' / ' + formatBytes(e.total);
      }
    };

    xhr.onload = function() {
      try {
        var data = JSON.parse(xhr.responseText);
        if (xhr.status === 200 && data.url) {
          progressWrap.classList.remove('active');
          resultFilename.textContent = data.filename;
          resultUrl.value = data.url;
          resultSize.textContent = formatBytes(data.size);
          var exp = new Date(data.expires);
          resultExpiry.textContent = L.expires + ' ' + exp.toLocaleString();
          resultDiv.classList.add('active');
          copyBtn.textContent = L.copy;
          // Reset Turnstile for next upload
          if (typeof turnstile !== 'undefined') turnstile.reset();
          uploadToken = null;
        } else {
          showError(data.error || L.uploadFailed);
        }
      } catch (e) {
        showError(L.uploadFailed);
      }
    };

    xhr.onerror = function() { showError(L.networkError); };
    xhr.send(formData);
  }

  // Drag and drop
  dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('drag-over'); });
  dropzone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', function() {
    if (fileInput.files.length) uploadFile(fileInput.files[0]);
  });

  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(resultUrl.value).then(function() {
      copyBtn.textContent = L.copied;
      copyBtn.classList.add('copied');
      setTimeout(function() { copyBtn.textContent = L.copy; copyBtn.classList.remove('copied'); }, 1500);
    });
  });

  uploadAnother.addEventListener('click', function(e) { e.preventDefault(); resetUI(); });

  /* --- Feedback --- */
  var fbToggle = document.getElementById('fbToggle');
  var fbForm = document.getElementById('fbForm');
  var fbMsg = document.getElementById('fbMsg');
  var fbSubmit = document.getElementById('fbSubmit');
  var fbStatus = document.getElementById('fbStatus');
  var tsStatus = document.getElementById('tsStatus');
  var fbToken = null;
  var fbTsLoaded = false;

  fbToggle.addEventListener('click', function() {
    var open = fbForm.classList.toggle('open');
    if (open && !fbTsLoaded) {
      fbTsLoaded = true;
      tsStatus.innerHTML = '<span class="dot">\u25cf</span>';
      window.__fbTsReady = function() {
        if (typeof turnstile !== 'undefined') {
          turnstile.render('#tsCont', {
            sitekey: '0x4AAAAAACyDQkFarV18g9f6',
            size: 'flexible',
            appearance: 'interaction-only',
            callback: function(token) { fbToken = token; tsStatus.textContent = ''; fbSubmit.disabled = !fbMsg.value.trim(); },
            'error-callback': function() { tsStatus.textContent = ''; },
          });
        }
      };
      if (typeof turnstile !== 'undefined') { window.__fbTsReady(); }
      else {
        var s = document.createElement('script');
        s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=__fbTsReady&render=explicit';
        s.async = true;
        document.head.appendChild(s);
      }
    }
    if (!open) { fbStatus.textContent = ''; fbToken = null; fbSubmit.disabled = true; }
  });

  fbMsg.addEventListener('input', function() { fbSubmit.disabled = !(fbMsg.value.trim() && fbToken); });

  fbForm.addEventListener('submit', function(e) {
    e.preventDefault();
    fbSubmit.disabled = true;
    fbStatus.textContent = L.feedbackSending;
    fbStatus.className = 'feedback-msg';
    fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: fbMsg.value, page: location.pathname, token: fbToken }),
    })
    .then(function(res) {
      if (res.ok) {
        fbForm.classList.remove('open');
        fbMsg.value = '';
        fbToken = null;
        fbStatus.textContent = L.feedbackThanks;
        fbStatus.className = 'feedback-msg ok';
      } else {
        fbStatus.textContent = L.feedbackError;
        fbStatus.className = 'feedback-msg err';
      }
      fbSubmit.disabled = true;
    })
    .catch(function() {
      fbStatus.textContent = L.feedbackError;
      fbStatus.className = 'feedback-msg err';
    });
  });
})();

// Theme toggle
(function(){
  var btn = document.getElementById('themeToggle');
  function getTheme() { return document.documentElement.getAttribute('data-theme') || 'light'; }
  function setIcon() { btn.textContent = getTheme() === 'dark' ? '\u2600' : '\u263E'; }
  setIcon();
  btn.addEventListener('click', function() {
    var next = getTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    setIcon();
  });
})();
</script>
</body>
