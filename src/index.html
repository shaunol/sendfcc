<style>
  :root {
    --bg: #f0fdfa;
    --surface: #ffffff;
    --text: #134e4a;
    --text-muted: #5f8a87;
    --accent: #0d9488;
    --accent-hover: #0f766e;
    --accent-light: #ccfbf1;
    --border: #d1e7e5;
    --green: #16a34a;
    --red: #dc2626;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 16px;
  }
  [data-theme="dark"] {
    --bg: #0f1513;
    --surface: #1a2320;
    --text: #d1e7e5;
    --text-muted: #7a9e9a;
    --accent: #2dd4bf;
    --accent-hover: #5eead4;
    --accent-light: #1a2f2b;
    --border: #2a3f3a;
    --green: #4ade80;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 520px; }

  /* Header */
  .brand { text-align: center; margin-bottom: 2rem; }
  .brand h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
  .brand h1 .cc { color: var(--accent); }
  .brand p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.35rem; }

  /* Language suggestion */
  .lang-suggest {
    display: none;
    font-size: 0.82rem;
    font-family: var(--mono);
    color: var(--text-muted);
    background: var(--accent-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .lang-suggest a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .lang-suggest a:hover {
    text-decoration: underline;
  }

  /* Features */
  .features {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .features h2 {
    font-size: 0.92rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  .features ul {
    list-style: none;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .features li {
    padding: 0.3rem 0;
    padding-left: 1.25rem;
    position: relative;
  }
  .features li::before {
    content: '\2713';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }

  /* Drop zone */
  .dropzone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .dropzone-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.6; }
  .dropzone-text { color: var(--text-muted); font-size: 0.92rem; line-height: 1.5; }
  .dropzone-text strong { color: var(--accent); }
  .dropzone-limit { color: var(--text-muted); font-family: var(--mono); font-size: 0.75rem; margin-top: 0.75rem; }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* Progress */
  .progress-wrap { display: none; margin-top: 1.5rem; }
  .progress-wrap.active { display: block; }
  .progress-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; transition: width 0.3s; }
  .progress-fill.stalled { background: repeating-linear-gradient(45deg, var(--accent) 0 8px, var(--accent-hover) 8px 16px); }
  .progress-text { font-family: var(--mono); font-size: 0.78rem; color: var(--text-muted); margin-top: 0.4rem; text-align: center; }
  .progress-status { font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; text-align: center; min-height: 1em; opacity: 0.85; }
  .progress-status.warn { color: var(--red); opacity: 1; }
  .progress-cancel { display: block; margin: 0.6rem auto 0; padding: 0.35rem 0.9rem; background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 0.75rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .progress-cancel:hover { border-color: var(--red); color: var(--red); }

  /* Resume prompt */
  .resume-prompt { display: none; margin-top: 1rem; padding: 0.9rem 1rem; background: var(--accent-light); border: 1.5px solid var(--border); border-radius: 10px; }
  .resume-prompt.active { display: block; }
  .resume-msg { font-family: var(--mono); font-size: 0.82rem; color: var(--text); text-align: center; margin-bottom: 0.6rem; line-height: 1.4; }
  .resume-msg strong { color: var(--accent-hover); word-break: break-all; }
  .resume-buttons { display: flex; gap: 0.5rem; justify-content: center; }
  .resume-buttons button { padding: 0.45rem 1rem; font-family: var(--mono); font-size: 0.78rem; border-radius: 8px; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); transition: background 0.15s, border-color 0.15s; }
  .resume-buttons button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  [data-theme="dark"] .resume-buttons button.primary { color: #0f1513; }
  .resume-buttons button:hover { border-color: var(--accent); }

  /* Result */
  .result { display: none; margin-top: 1.5rem; }
  .result.active { display: block; }
  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .result-filename {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-url-row {
    display: flex;
    gap: 0.5rem;
    align-items: stretch;
  }
  .result-url {
    flex: 1;
    font-family: var(--mono);
    font-size: 0.88rem;
    padding: 0.6rem 0.75rem;
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    color: var(--accent-hover);
    font-weight: 500;
    outline: none;
    cursor: text;
  }
  .copy-btn {
    padding: 0.6rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .copy-btn:hover { background: var(--accent-hover); }
  .copy-btn.copied { background: var(--green); }
  .result-meta {
    display: flex;
    gap: 1rem;
    margin-top: 0.75rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .upload-another {
    display: block;
    text-align: center;
    margin-top: 1rem;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.82rem;
    text-decoration: none;
    cursor: pointer;
  }
  .upload-another:hover { text-decoration: underline; }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 1rem;
    padding: 0.6rem 1rem;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    color: var(--red);
    font-family: var(--mono);
    font-size: 0.82rem;
    text-align: center;
  }
  .error-msg.active { display: block; }

  /* Footer */
  footer {
    text-align: center;
    padding: 1.5rem 1rem;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Language picker */
  .lang-picker {
    margin-top: 0.5rem;
  }
  .lang-picker select {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.2rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
  }

  /* Feedback */
  .feedback-wrap { margin-top: 0.75rem; }
  .feedback-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    padding: 0;
  }
  .feedback-toggle:hover { text-decoration: underline; }
  .feedback-form {
    display: none;
    margin-top: 0.75rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .feedback-form.open { display: block; }
  .feedback-form textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.6rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 0.85rem;
    resize: vertical;
    background: var(--surface);
    color: var(--text);
  }
  .feedback-form textarea:focus { outline: none; border-color: var(--accent); }
  .feedback-submit {
    margin-top: 0.5rem;
    width: 100%;
    padding: 0.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.82rem;
    cursor: pointer;
  }
  .feedback-submit:disabled { opacity: 0.4; cursor: default; }
  .ts-status { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-align: center; min-height: 1.2em; }
  .ts-status .dot { display: inline-block; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .feedback-msg { margin-top: 0.5rem; font-family: var(--mono); font-size: 0.78rem; text-align: center; }
  .feedback-msg.ok { color: var(--green); }
  .feedback-msg.err { color: var(--red); }

  .expiry-picker {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.75rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .expiry-picker select {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.25rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  #uploadTs { display:flex; justify-content:center; margin-top:0.75rem; }
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

  /* Theme toggle */
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    line-height: 1;
    transition: border-color 0.15s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* Dark mode overrides */
  [data-theme="dark"] .error-msg { background: #2a1515; border-color: #5c2a2a; }
  [data-theme="dark"] .copy-btn.copied { background: var(--green); color: #0f1513; }

  /* Noscript */
  noscript { display: block; text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
</style>
</head>
<body>
<script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})()</script>
<button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
<main>
  <div class="container">
    <div class="brand">
      <h1>sendf<span class="cc">.cc</span></h1>
      <p>{{h1Sub}}</p>
    </div>

    <div class="lang-suggest" id="langSuggest"></div>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon" aria-hidden="true">&#128228;</div>
      <div class="dropzone-text">
        {{dropText}}
      </div>
      <div class="dropzone-limit">{{dropLimit}}</div>
      <input type="file" id="fileInput" aria-label="{{selectFile}}">
    </div>

    <div class="expiry-picker">
      <label for="expirySelect" class="sr-only">{{expiryLabel}}</label>
      <span class="expiry-label">{{expiryLabel}}</span>
      <select id="expirySelect">
        <option value="1">1h</option>
        <option value="6">6h</option>
        <option value="12">12h</option>
        <option value="24" selected>24h</option>
      </select>
    </div>

    <div id="uploadTs"></div>

    <div class="resume-prompt" id="resumePrompt" role="dialog">
      <div class="resume-msg" id="resumeMsg"></div>
      <div class="resume-buttons">
        <button type="button" class="primary" id="resumeYes">{{resumeYes}}</button>
        <button type="button" id="resumeNo">{{resumeNo}}</button>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">{{uploading}}&hellip;</div>
      <div class="progress-status" id="progressStatus"></div>
      <button type="button" class="progress-cancel" id="progressCancel">{{cancelUpload}}</button>
    </div>

    <div class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></div>

    <div class="result" id="result">
      <div class="result-card">
        <div class="result-filename" id="resultFilename"></div>
        <div class="result-url-row">
          <input type="text" class="result-url" id="resultUrl" readonly>
          <button type="button" class="copy-btn" id="copyBtn" aria-label="{{copy}}">{{copy}}</button>
        </div>
        <div class="result-meta">
          <span id="resultSize"></span>
          <span id="resultExpiry"></span>
        </div>
      </div>
      <a class="upload-another" id="uploadAnother">{{uploadAnother}}</a>
    </div>

    <div class="features">
      <h2>{{featuresHeading}}</h2>
      <ul>
        <li>{{feature1}}</li>
        <li>{{feature2}}</li>
        <li>{{feature3}}</li>
        <li>{{feature4}}</li>
      </ul>
    </div>

    <noscript>
      <p>{{noscriptText}}</p>
    </noscript>
  </div>
</main>

<footer>
  {{footerText}}
  <div class="lang-picker">
    <label for="langPicker" class="sr-only">Language</label>
    <select id="langPicker">
      {{languageOptions}}
    </select>
  </div>
  <div class="feedback-wrap">
    <button type="button" class="feedback-toggle" id="fbToggle">{{feedbackToggle}}</button>
    <form class="feedback-form" id="fbForm" aria-label="{{feedbackToggle}}">
      <label for="fbMsg" class="sr-only">Feedback</label>
      <textarea id="fbMsg" placeholder="{{feedbackPlaceholder}}" maxlength="2000"></textarea>
      <div class="cf-turnstile" id="tsCont"></div>
      <div class="ts-status" id="tsStatus"></div>
      <button type="submit" class="feedback-submit" id="fbSubmit" disabled>{{feedbackSubmit}}</button>
    </form>
    <div class="feedback-msg" id="fbStatus" role="status" aria-live="polite"></div>
  </div>
</footer>

<script>
var L = {{jsStrings}};
(function() {
  var dropzone = document.getElementById('dropzone');
  var fileInput = document.getElementById('fileInput');
  var progressWrap = document.getElementById('progressWrap');
  var progressFill = document.getElementById('progressFill');
  var progressText = document.getElementById('progressText');
  var errorMsg = document.getElementById('errorMsg');
  var resultDiv = document.getElementById('result');
  var resultFilename = document.getElementById('resultFilename');
  var resultUrl = document.getElementById('resultUrl');
  var resultSize = document.getElementById('resultSize');
  var resultExpiry = document.getElementById('resultExpiry');
  var copyBtn = document.getElementById('copyBtn');
  var uploadAnother = document.getElementById('uploadAnother');
  var currentToken = null;
  var uploadToken = null;
  var tsLoaded = false;

  // Language picker
  var langPicker = document.getElementById('langPicker');
  if (langPicker) {
    langPicker.addEventListener('change', function() {
      window.location.href = langPicker.value;
    });
  }

  // Language suggestion
  var LANG_NAMES = { en: 'English', th: '\u0e44\u0e17\u0e22', ja: '\u65e5\u672c\u8a9e', de: 'Deutsch', fr: 'Fran\u00e7ais', es: 'Espa\u00f1ol' };
  var LANG_URLS = { en: '/', th: '/th/', ja: '/ja/', de: '/de/', fr: '/fr/', es: '/es/' };
  (function() {
    var suggest = document.documentElement.dataset.suggestLang;
    if (!suggest || !LANG_NAMES[suggest]) return;
    var el = document.getElementById('langSuggest');
    if (!el) return;
    el.innerHTML = (L.switchLang || '') + ' <a href="' + LANG_URLS[suggest] + '">' + LANG_NAMES[suggest] + '</a>';
    el.style.display = 'block';
  })();

  // Load Turnstile early (invisible, interaction-only)
  function loadTurnstile(targetId, callback) {
    if (tsLoaded) return;
    tsLoaded = true;
    window.__tsReady = function() {
      if (typeof turnstile !== 'undefined') {
        turnstile.render('#' + targetId, {
          sitekey: '0x4AAAAAACyDQkFarV18g9f6',
          size: 'flexible',
          appearance: 'interaction-only',
          callback: function(token) { callback(token); },
          'error-callback': function() {},
        });
      }
    };
    var s = document.createElement('script');
    s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=__tsReady&render=explicit';
    s.async = true;
    document.head.appendChild(s);
  }

  // Load upload Turnstile on page load
  loadTurnstile('uploadTs', function(token) { uploadToken = token; });

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
    return (b / 1073741824).toFixed(1) + ' GB';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('active');
    progressWrap.classList.remove('active');
    progressFill.classList.remove('stalled');
    // Only bring the dropzone back if we're not mid-resume prompt.
    if (!resumePrompt.classList.contains('active')) dropzone.style.display = '';
  }

  function resetUI() {
    dropzone.style.display = '';
    progressWrap.classList.remove('active');
    progressFill.classList.remove('stalled');
    resultDiv.classList.remove('active');
    errorMsg.classList.remove('active');
    resumePrompt.classList.remove('active');
    progressFill.style.width = '0%';
    progressStatus.textContent = '';
    progressStatus.classList.remove('warn');
    fileInput.value = '';
  }

  /* --- Chunked resumable uploader ---------------------------------------
   * Design goals:
   *   - Survive TCP stalls: per-chunk stall timer aborts + retries a chunk
   *     if no bytes move for STALL_MS.
   *   - Survive intermittent loss: per-chunk exponential backoff, up to
   *     MAX_RETRIES attempts per chunk before failing the whole upload.
   *   - Survive tab close / reload: chunk completion set persisted to
   *     localStorage, keyed on name|size|lastModified. On next visit with
   *     the same file, we offer to resume.
   *   - Survive wifi drops: online/offline listener pauses retries until
   *     the browser reports connectivity.
   *   - Survive server-side loss: /upload/status re-checks which chunks
   *     the node actually still has before resuming.
   *   - Single Turnstile check per session (at init); chunks are
   *     authenticated by the opaque upload id.
   */
  var CHUNK_SIZE = 4 * 1024 * 1024;
  var MAX_RETRIES = 6;
  var STALL_MS = 30000;
  var CONCURRENCY = 2;
  var SESSION_TTL_MS = 12 * 3600 * 1000;
  var LS_PREFIX = 'sendf:up:';

  var resumePrompt = document.getElementById('resumePrompt');
  var resumeMsg = document.getElementById('resumeMsg');
  var resumeYes = document.getElementById('resumeYes');
  var resumeNo = document.getElementById('resumeNo');
  var progressStatus = document.getElementById('progressStatus');
  var progressCancel = document.getElementById('progressCancel');

  var currentUpload = null;

  function fpKey(file) {
    return LS_PREFIX + [file.name, file.size, file.lastModified].join('|');
  }

  function loadSession(file) {
    try {
      var raw = localStorage.getItem(fpKey(file));
      if (!raw) return null;
      var s = JSON.parse(raw);
      if (!s || !s.uploadId || !s.createdAt) return null;
      if (Date.now() - s.createdAt > SESSION_TTL_MS) {
        localStorage.removeItem(fpKey(file));
        return null;
      }
      return s;
    } catch (e) { return null; }
  }

  function saveSession(file, data) {
    try {
      var payload = {
        uploadId: data.uploadId,
        totalChunks: data.totalChunks,
        chunkSize: data.chunkSize,
        filename: data.filename,
        size: file.size,
        ttlHours: data.ttlHours,
        done: data.done || [],
        createdAt: data.createdAt || Date.now(),
        name: file.name,
        lastModified: file.lastModified,
      };
      localStorage.setItem(fpKey(file), JSON.stringify(payload));
    } catch (e) {}
  }

  function clearSession(file) {
    try { localStorage.removeItem(fpKey(file)); } catch (e) {}
  }

  function sleep(ms, signal) {
    return new Promise(function(resolve, reject) {
      var t = setTimeout(resolve, ms);
      if (signal) {
        signal.addEventListener('abort', function() { clearTimeout(t); reject(new Error('aborted')); }, { once: true });
      }
    });
  }

  function backoffMs(attempt) {
    var base = Math.min(30000, Math.pow(2, attempt) * 500);
    return Math.round(base * (0.7 + Math.random() * 0.6));
  }

  function waitForOnline(signal) {
    if (navigator.onLine) return Promise.resolve();
    setStatus(L.uploadOffline, true);
    return new Promise(function(resolve, reject) {
      function on() { window.removeEventListener('online', on); resolve(); }
      window.addEventListener('online', on);
      if (signal) signal.addEventListener('abort', function() {
        window.removeEventListener('online', on);
        reject(new Error('aborted'));
      }, { once: true });
    });
  }

  function setStatus(msg, warn) {
    progressStatus.textContent = msg || '';
    progressStatus.classList.toggle('warn', !!warn);
  }

  function renderProgress(state) {
    var sent = 0;
    for (var i = 0; i < state.totalChunks; i++) {
      if (state.done[i]) {
        var chunkEnd = Math.min(state.size, (i + 1) * state.chunkSize);
        sent += chunkEnd - (i * state.chunkSize);
      } else {
        sent += state.inFlight[i] || 0;
      }
    }
    if (sent > state.size) sent = state.size;
    var pct = state.size > 0 ? Math.min(100, Math.round((sent / state.size) * 100)) : 0;
    progressFill.style.width = pct + '%';
    progressText.textContent = pct + '% \u2014 ' + formatBytes(sent) + ' / ' + formatBytes(state.size);
  }

  function putChunk(state, index, blob) {
    return new Promise(function(resolve, reject) {
      if (state.aborted) return reject(new Error('aborted'));
      var xhr = new XMLHttpRequest();
      state.xhrs[index] = xhr;
      xhr.open('PUT', '/upload/chunk/' + state.uploadId + '/' + index);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');

      var lastAt = Date.now();
      var stallTimer = setInterval(function() {
        if (Date.now() - lastAt > STALL_MS) {
          clearInterval(stallTimer);
          progressFill.classList.add('stalled');
          try { xhr.abort(); } catch (e) {}
        }
      }, 2000);

      xhr.upload.onprogress = function(e) {
        if (!e.lengthComputable) return;
        lastAt = Date.now();
        progressFill.classList.remove('stalled');
        state.inFlight[index] = e.loaded;
        renderProgress(state);
      };

      xhr.onload = function() {
        clearInterval(stallTimer);
        delete state.xhrs[index];
        if (xhr.status >= 200 && xhr.status < 300) {
          state.inFlight[index] = 0;
          state.done[index] = true;
          persist(state);
          renderProgress(state);
          resolve();
        } else {
          var e = new Error('http_' + xhr.status);
          e.status = xhr.status;
          // 4xx other than 408/429 = permanent; 5xx/network = retryable
          e.retryable = xhr.status >= 500 || xhr.status === 0 || xhr.status === 408 || xhr.status === 429;
          e.body = xhr.responseText;
          reject(e);
        }
      };
      xhr.onerror = function() {
        clearInterval(stallTimer);
        delete state.xhrs[index];
        state.inFlight[index] = 0;
        var e = new Error('network');
        e.retryable = true;
        reject(e);
      };
      xhr.onabort = function() {
        clearInterval(stallTimer);
        delete state.xhrs[index];
        state.inFlight[index] = 0;
        if (state.aborted) return reject(new Error('aborted'));
        var e = new Error('stalled');
        e.retryable = true;
        reject(e);
      };

      try {
        xhr.send(blob);
      } catch (e) {
        clearInterval(stallTimer);
        delete state.xhrs[index];
        reject(e);
      }
    });
  }

  function persist(state) {
    saveSession(state.file, {
      uploadId: state.uploadId,
      totalChunks: state.totalChunks,
      chunkSize: state.chunkSize,
      filename: state.filename,
      ttlHours: state.ttlHours,
      done: state.done.map(function(d) { return d ? 1 : 0; }),
      createdAt: state.createdAt,
    });
  }

  async function uploadChunkWithRetry(state, index) {
    var start = index * state.chunkSize;
    var end = Math.min(state.size, start + state.chunkSize);
    var blob = state.file.slice(start, end);

    for (var attempt = 0; attempt <= MAX_RETRIES; attempt++) {
      if (state.aborted) throw new Error('aborted');
      if (!navigator.onLine) await waitForOnline(state.signal);

      try {
        await putChunk(state, index, blob);
        return;
      } catch (err) {
        if (state.aborted || err.message === 'aborted') throw new Error('aborted');
        if (!err.retryable || attempt === MAX_RETRIES) throw err;
        var delay = backoffMs(attempt);
        setStatus(L.uploadRetry + ' ' + Math.round(delay / 1000) + 's (' + (attempt + 1) + '/' + MAX_RETRIES + ')', true);
        try { await sleep(delay, state.signal); } catch (e) { throw new Error('aborted'); }
        setStatus('');
      }
    }
  }

  async function runUpload(state) {
    var queue = [];
    for (var i = 0; i < state.totalChunks; i++) if (!state.done[i]) queue.push(i);

    async function worker() {
      while (queue.length > 0) {
        if (state.aborted) return;
        var idx = queue.shift();
        if (idx === undefined) return;
        await uploadChunkWithRetry(state, idx);
      }
    }

    var workers = [];
    for (var w = 0; w < Math.min(CONCURRENCY, queue.length || 1); w++) workers.push(worker());
    await Promise.all(workers);
  }

  function jsonFetch(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
    return fetch(url, opts).then(function(r) {
      return r.json().catch(function() { return null; }).then(function(d) {
        return { ok: r.ok, status: r.status, data: d };
      });
    });
  }

  async function jsonFetchRetry(url, opts, attempts) {
    attempts = attempts || 3;
    var lastErr;
    for (var i = 0; i < attempts; i++) {
      try {
        var res = await jsonFetch(url, opts);
        if (res.ok) return res;
        if (res.status >= 400 && res.status < 500 && res.status !== 408 && res.status !== 429) return res;
        lastErr = res;
      } catch (e) {
        lastErr = { ok: false, status: 0, data: null, error: e };
      }
      if (i < attempts - 1) await sleep(backoffMs(i));
    }
    return lastErr || { ok: false, status: 0, data: null };
  }

  function formatShortName(s) {
    if (!s) return '';
    if (s.length <= 32) return s;
    return s.slice(0, 14) + '\u2026' + s.slice(-14);
  }

  async function uploadFile(file) {
    if (!file) return;
    if (file.size > 500 * 1024 * 1024) { showError(L.fileTooLarge); return; }
    if (file.size === 0) { showError(L.emptyFile); return; }

    errorMsg.classList.remove('active');
    resultDiv.classList.remove('active');
    resumePrompt.classList.remove('active');

    var existing = loadSession(file);
    if (existing) {
      var status = await jsonFetch('/upload/status/' + existing.uploadId, { method: 'GET' });
      if (status.ok && status.data && !status.data.completed) {
        var serverParts = status.data.parts || [];
        var recoverable = serverParts.length > 0;
        if (recoverable) {
          offerResume(file, existing, status.data);
          return;
        }
      } else if (status.ok && status.data && status.data.completed) {
        // Somehow already completed — skip to success (shouldn't normally hit this).
        clearSession(file);
      }
      // Stale or empty — silently start fresh.
      clearSession(file);
    }

    await startNewUpload(file);
  }

  function offerResume(file, saved, serverStatus) {
    var pct = Math.round((serverStatus.bytes / file.size) * 100);
    resumeMsg.innerHTML = L.resumeMsg
      .replace('{name}', '<strong>' + escapeHtml(file.name) + '</strong>')
      .replace('{pct}', pct + '%');
    resumePrompt.classList.add('active');
    dropzone.style.display = 'none';

    resumeYes.onclick = function() {
      resumePrompt.classList.remove('active');
      resumeExisting(file, saved, serverStatus);
    };
    resumeNo.onclick = function() {
      resumePrompt.classList.remove('active');
      // best-effort clean the server side
      fetch('/upload/' + saved.uploadId, { method: 'DELETE' }).catch(function() {});
      clearSession(file);
      startNewUpload(file);
    };
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function resumeExisting(file, saved, serverStatus) {
    if (!uploadToken) {
      // Resume doesn't need Turnstile (already verified at init), so this is fine.
    }
    var state = makeState(file, {
      uploadId: saved.uploadId,
      totalChunks: saved.totalChunks,
      chunkSize: saved.chunkSize,
      filename: saved.filename,
      ttlHours: saved.ttlHours,
      createdAt: saved.createdAt,
    });
    // Seed the done[] from the server's authoritative list, not from localStorage alone.
    var serverParts = serverStatus.parts || [];
    for (var i = 0; i < serverParts.length; i++) state.done[serverParts[i]] = true;
    persist(state);
    currentUpload = state;
    startProgressUI(state, L.uploadResuming + ' ' + file.name);
    try {
      await runUpload(state);
      await finalize(state);
    } catch (e) {
      handleUploadError(state, e);
    }
  }

  function makeState(file, session) {
    return {
      file: file,
      size: file.size,
      uploadId: session.uploadId,
      totalChunks: session.totalChunks,
      chunkSize: session.chunkSize,
      filename: session.filename,
      ttlHours: session.ttlHours,
      createdAt: session.createdAt || Date.now(),
      done: new Array(session.totalChunks).fill(false),
      inFlight: {},
      xhrs: {},
      aborted: false,
      signal: (function() {
        var ac = (typeof AbortController !== 'undefined') ? new AbortController() : null;
        return ac ? ac.signal : null;
      })(),
    };
  }

  async function startNewUpload(file) {
    if (!uploadToken) {
      showError(L.verifyingFirst || L.uploadFailed);
      // Try to load Turnstile if not loaded
      loadTurnstile('uploadTs', function(token) { uploadToken = token; showError(''); errorMsg.classList.remove('active'); });
      return;
    }

    startProgressUI(null, L.uploadPreparing);
    dropzone.style.display = 'none';

    var ttl = document.getElementById('expirySelect').value;
    var init = await jsonFetchRetry('/upload/init', {
      method: 'POST',
      body: JSON.stringify({
        filename: file.name,
        size: file.size,
        mime: file.type || '',
        token: uploadToken,
        ttl: ttl,
      }),
    }, 3);
    if (!init.ok || !init.data || !init.data.uploadId) {
      var msg = (init.data && init.data.error) || L.uploadFailed;
      showError(msg);
      if (typeof turnstile !== 'undefined') turnstile.reset();
      uploadToken = null;
      return;
    }
    // Init consumes the Turnstile token; get a fresh one for the next upload.
    if (typeof turnstile !== 'undefined') turnstile.reset();
    uploadToken = null;

    var state = makeState(file, init.data);
    persist(state);
    currentUpload = state;

    progressText.textContent = '0% \u2014 ' + formatBytes(0) + ' / ' + formatBytes(file.size);
    setStatus('');

    try {
      await runUpload(state);
      await finalize(state);
    } catch (e) {
      handleUploadError(state, e);
    }
  }

  function startProgressUI(state, label) {
    progressWrap.classList.add('active');
    progressFill.classList.remove('stalled');
    progressFill.style.width = '0%';
    progressText.textContent = label || (L.uploading + '\u2026');
    setStatus('');
    if (state) renderProgress(state);
  }

  async function finalize(state) {
    if (state.aborted) return;
    setStatus(L.uploadFinalizing);
    progressFill.style.width = '100%';

    var complete = await jsonFetchRetry('/upload/complete/' + state.uploadId, {
      method: 'POST',
      body: JSON.stringify({}),
    }, 4);
    if (!complete.ok || !complete.data || !complete.data.url) {
      // If the server says chunks missing, try to re-upload those chunks and retry.
      if (complete.data && complete.data.error === 'Missing chunks' && Array.isArray(complete.data.missing)) {
        setStatus(L.uploadRepairing || L.uploadRetry, true);
        for (var i = 0; i < complete.data.missing.length; i++) state.done[complete.data.missing[i]] = false;
        persist(state);
        try {
          await runUpload(state);
        } catch (e) { handleUploadError(state, e); return; }
        var retry = await jsonFetchRetry('/upload/complete/' + state.uploadId, { method: 'POST', body: JSON.stringify({}) }, 2);
        if (retry.ok && retry.data && retry.data.url) { showResult(state, retry.data); return; }
        showError((retry.data && retry.data.error) || L.uploadFailed);
        return;
      }
      showError((complete.data && complete.data.error) || L.uploadFailed);
      return;
    }
    showResult(state, complete.data);
  }

  function showResult(state, data) {
    clearSession(state.file);
    currentUpload = null;
    progressWrap.classList.remove('active');
    progressFill.classList.remove('stalled');
    resultFilename.textContent = data.filename;
    resultUrl.value = data.url;
    resultSize.textContent = formatBytes(data.size);
    var exp = new Date(data.expires);
    resultExpiry.textContent = L.expires + ' ' + exp.toLocaleString();
    resultDiv.classList.add('active');
    copyBtn.textContent = L.copy;
  }

  function handleUploadError(state, err) {
    if (err && err.message === 'aborted') return;
    var detail = (err && err.body) ? (function() { try { return JSON.parse(err.body).error; } catch (e) { return null; } })() : null;
    showError(detail || L.uploadFailed + (err && err.message ? ' (' + err.message + ')' : ''));
    setStatus(L.uploadCanResume || '', true);
    // keep localStorage so user can reload page and pick same file to resume
  }

  function cancelUpload() {
    if (!currentUpload) { resetUI(); return; }
    var state = currentUpload;
    state.aborted = true;
    Object.keys(state.xhrs).forEach(function(k) { try { state.xhrs[k].abort(); } catch (e) {} });
    fetch('/upload/' + state.uploadId, { method: 'DELETE' }).catch(function() {});
    clearSession(state.file);
    currentUpload = null;
    resetUI();
  }

  progressCancel.addEventListener('click', function() {
    if (confirm(L.cancelConfirm || 'Cancel upload?')) cancelUpload();
  });

  window.addEventListener('online', function() {
    if (currentUpload && !currentUpload.aborted) setStatus(L.uploadResumedOnline || '');
  });
  window.addEventListener('offline', function() {
    if (currentUpload && !currentUpload.aborted) setStatus(L.uploadOffline, true);
  });

  window.addEventListener('beforeunload', function(e) {
    if (currentUpload && !currentUpload.aborted) {
      e.preventDefault();
      e.returnValue = '';
      return '';
    }
  });

  // Drag and drop
  dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('drag-over'); });
  dropzone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', function() {
    if (fileInput.files.length) uploadFile(fileInput.files[0]);
  });

  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(resultUrl.value).then(function() {
      copyBtn.textContent = L.copied;
      copyBtn.classList.add('copied');
      setTimeout(function() { copyBtn.textContent = L.copy; copyBtn.classList.remove('copied'); }, 1500);
    });
  });

  uploadAnother.addEventListener('click', function(e) { e.preventDefault(); resetUI(); });

  /* --- Feedback --- */
  var fbToggle = document.getElementById('fbToggle');
  var fbForm = document.getElementById('fbForm');
  var fbMsg = document.getElementById('fbMsg');
  var fbSubmit = document.getElementById('fbSubmit');
  var fbStatus = document.getElementById('fbStatus');
  var tsStatus = document.getElementById('tsStatus');
  var fbToken = null;
  var fbTsLoaded = false;

  fbToggle.addEventListener('click', function() {
    var open = fbForm.classList.toggle('open');
    if (open && !fbTsLoaded) {
      fbTsLoaded = true;
      tsStatus.innerHTML = '<span class="dot">\u25cf</span>';
      window.__fbTsReady = function() {
        if (typeof turnstile !== 'undefined') {
          turnstile.render('#tsCont', {
            sitekey: '0x4AAAAAACyDQkFarV18g9f6',
            size: 'flexible',
            appearance: 'interaction-only',
            callback: function(token) { fbToken = token; tsStatus.textContent = ''; fbSubmit.disabled = !fbMsg.value.trim(); },
            'error-callback': function() { tsStatus.textContent = ''; },
          });
        }
      };
      if (typeof turnstile !== 'undefined') { window.__fbTsReady(); }
      else {
        var s = document.createElement('script');
        s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=__fbTsReady&render=explicit';
        s.async = true;
        document.head.appendChild(s);
      }
    }
    if (!open) { fbStatus.textContent = ''; fbToken = null; fbSubmit.disabled = true; }
  });

  fbMsg.addEventListener('input', function() { fbSubmit.disabled = !(fbMsg.value.trim() && fbToken); });

  fbForm.addEventListener('submit', function(e) {
    e.preventDefault();
    fbSubmit.disabled = true;
    fbStatus.textContent = L.feedbackSending;
    fbStatus.className = 'feedback-msg';
    fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: fbMsg.value, page: location.pathname, token: fbToken }),
    })
    .then(function(res) {
      if (res.ok) {
        fbForm.classList.remove('open');
        fbMsg.value = '';
        fbToken = null;
        fbStatus.textContent = L.feedbackThanks;
        fbStatus.className = 'feedback-msg ok';
      } else {
        fbStatus.textContent = L.feedbackError;
        fbStatus.className = 'feedback-msg err';
      }
      fbSubmit.disabled = true;
    })
    .catch(function() {
      fbStatus.textContent = L.feedbackError;
      fbStatus.className = 'feedback-msg err';
    });
  });
})();

// Theme toggle
(function(){
  var btn = document.getElementById('themeToggle');
  function getTheme() { return document.documentElement.getAttribute('data-theme') || 'light'; }
  function setIcon() { btn.textContent = getTheme() === 'dark' ? '\u2600' : '\u263E'; }
  setIcon();
  btn.addEventListener('click', function() {
    var next = getTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    setIcon();
  });
})();
</script>
</body>
